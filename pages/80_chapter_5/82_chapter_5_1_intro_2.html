            <bullet-item 
                title="Declarative Extensibility:" 
                content="Actions (REST, Vector, RPC) are registered via secure database records or JSON configurations. The codebase reads these at runtime and converts them into LangChain-compatible tools on-the-fly, avoiding hardcoded integrations.">
            </bullet-item>

            <bullet-item 
                title="Human-in-the-Loop Gating:" 
                content="Sensitive actions automatically trigger confirmation checkpoints. This logic suspends the WebSocket execution stream, serializes the active AI context to PostgreSQL, and awaits manual cryptographic approval from an authorized human support agent.">
            </bullet-item>

            <bullet-item 
                title="SSRF Vulnerability Protection:" 
                content="A custom-built URL validation engine intercepts dynamically generated HTTP calls, blocking requests to internal loopback addresses and private IP subnets to protect the server architecture from malicious injections.">
            </bullet-item>

            <bullet-item 
                title="Context-Aware Edit Cascades:" 
                content="When a user modifies a previous message in the conversation, the backend seamlessly triggers a cascade deletion of all subsequent AI memory nodes. This effectively branches the context and prevents hallucination propagation.">
            </bullet-item>

            <bullet-item 
                title="Dynamic gRPC Compilation:" 
                content="The backend features an algorithmic compiler that generates Python Protobuf wrappers at runtime directly from raw `.proto` files, bypassing the need for manual pre-compilation steps during deployment.">
