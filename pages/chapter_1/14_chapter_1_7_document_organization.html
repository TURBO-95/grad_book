<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chapter 1.7 — Document Organization</title>
    <style>
        /* ── Design Tokens ────────────────────────────────────── */
        :root {
            --primary: #1a365d;
            --gold: #c6a254;
            --text-dark: #2d3748;
            --text-muted: #718096;
            --surface: #f8fafc;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: var(--text-dark);
            background: #ffffff;
            font-size: 10.5pt;
            line-height: 1.6;
        }

        /* ── PDF Page Container ───────────────────────────────── */
        .page-body {
            width: 100%;
            height: 100vh;
            padding: 42px 52px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            page-break-after: always;
        }

        /* ── Page Layout & Flow ───────────────────────────────── */
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .text-paragraph {
            text-align: justify;
            color: var(--text-dark);
            margin-bottom: 20px;
            text-indent: 30px;
            /* Standard academic paragraph indent */
        }

        /* ── Sub Header Component ─────────────────────────────── */
        .page-sub-header {
            margin-bottom: 24px;
            flex-shrink: 0;
        }

        .sub-header-title {
            font-size: 20pt;
            color: var(--primary);
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .sub-header-divider {
            height: 2px;
            width: 200px;
            background: var(--gold);
            border-radius: 2px;
        }

        /* ── Document Organization List ───────────────────────── */
        .doc-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 10px;
        }

        /* Doc Org Item Component Styles */
        .doc-org-item {
            display: flex;
            align-items: baseline;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px 18px;
            border-radius: 8px;
        }

        .doc-org-icon {
            color: var(--gold);
            font-size: 10pt;
            margin-right: 14px;
            flex-shrink: 0;
        }

        .doc-org-content {
            text-align: justify;
            color: var(--text-dark);
        }

        .doc-org-chapter {
            color: var(--primary);
            font-weight: 700;
            margin-right: 4px;
        }

        /* ── Page Footer Component ────────────────────────────── */
        .page-footer {
            margin-top: auto;
            text-align: center;
            padding-top: 18px;
            flex-shrink: 0;
        }

        .page-number {
            font-size: 11pt;
            font-weight: bold;
            color: var(--text-muted);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
    </style>
</head>

<body>

    <div class="page-body pdf-flex-page">

        <!-- Header -->
        <page-sub-header title="1.7 Document Organization"></page-sub-header>

        <!-- Main Content Area -->
        <div class="content-wrapper">

            <p class="text-paragraph">
                This graduation project book is structured into six comprehensive chapters, supplemented by extensive
                appendices, to reflect the scientific and engineering methodologies employed during the development of
                IntgraServeAI. A brief outline of the document's organization is provided below:
            </p>

            <!-- Document Organization List -->
            <div class="doc-list">

                <doc-org-item chapter="Chapter 1: Introduction."
                    description="Introduces the project's background, defines the problem statement, outlines the SMART objectives, and delineates the project's scope and contributions.">
                </doc-org-item>

                <doc-org-item chapter="Chapter 2: Literature Review."
                    description="Provides a detailed analysis of the prevailing theories, historical context, and recent advancements in Large Language Models, RAG systems, and enterprise automation.">
                </doc-org-item>

                <doc-org-item chapter="Chapter 3: System Analysis."
                    description="Explores the comprehensive analysis of the proposed system, detailing the functional and non-functional requirements, user scenarios, and the overarching system architecture.">
                </doc-org-item>

                <doc-org-item chapter="Chapter 4: System Design."
                    description="Delves into the technical blueprints of IntgraServeAI, presenting class diagrams, database schemas, API designs, and the internal algorithms governing the Action Engine.">
                </doc-org-item>

                <doc-org-item chapter="Chapter 5: System Implementation and Testing."
                    description="Discusses the mapping of design to actual code, highlighting sample application configurations, testing methodologies, and an evaluation of final results against initial objectives.">
                </doc-org-item>

                <doc-org-item chapter="Chapter 6: Conclusion and Future Work."
                    description="Summarizes the entire research and development effort, reflects on the technical limitations encountered, and proposes actionable avenues for future research and system expansion.">
                </doc-org-item>

                <doc-org-item chapter="Appendices:"
                    description="Contains supplementary materials, including detailed Use Case Specifications (Appendix A), Sequence Diagrams (Appendix B), and the complete API Reference Documentation (Appendix C).">
                </doc-org-item>

            </div>

        </div>

        <!-- Footer -->
        <page-footer page="7"></page-footer>

    </div>

</body>

</html>
