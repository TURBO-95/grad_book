            <text-section 
                title="Performance and Latency Expectations" 
                content="To provide a fluid, conversational experience that mimics human interaction, the system must target an average end-to-end response time of under three seconds for queries that do not require complex, multi-step backend action executions. Furthermore, the WebSocket gateway must implement a non-blocking event loop, dispatching LLM generation to background workers to ensure the connection remains open and highly responsive to incoming interruption frames.">
            </text-section>

            <text-section 
                title="Extensibility via Factory Patterns" 
                content="Given the rapid pace of advancement in foundational AI models, the system architecture must not be tightly coupled to a single provider (e.g., OpenAI). The backend must utilize Factory design patterns to dynamically load and instantiate model clients at runtime, supporting seamless switching between cloud providers (Google, Groq, Anthropic) or local, quantized edge deployments (Ollama, HuggingFace) without source code alterations.">
            </text-section>

            <text-section 
                title="Automated Recovery and Resiliency" 
                content="In the event of an external API failure during action execution, the system must degrade gracefully rather than crashing the user session. It must automatically wrap HTTP exceptions, feed the error context back into the LLM as a tool failure message, and prompt the model to either retry the execution with modified parameters or explain the failure directly to the user.">
            </text-section>
