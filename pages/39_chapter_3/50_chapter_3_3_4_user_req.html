    <div class="page-body pdf-flex-page">
        <page-sub-header title="3.3.4 User Requirements"></page-sub-header>

        <div class="content-wrapper">
            <p class="text-paragraph">
                The technical requirements exist ultimately to serve the operational needs of the system's human actors. Analyzing the intended user base reveals four primary personas, each demanding a highly specialized set of interactions with the IntgraServeAI ecosystem.
            </p>

            <bullet-item 
                title="The End-Customer:" 
                content="Requires a seamless, real-time conversational interface that accurately understands context and intent. They need the ability to edit previous inquiries without breaking the system's memory, and they expect their requests (e.g., policy queries or account modifications) to be resolved without being endlessly redirected to static web pages.">
            </bullet-item>

            <bullet-item 
                title="The Support User (Agent):" 
                content="Requires a consolidated dashboard to monitor escalated or complex tickets. When an AI hits a dead end or requires human approval for a sensitive action, the Support User needs immediate access to the serialized chat history, the extracted parameters, and an intuitive interface to either approve or deny the AI's pending execution.">
            </bullet-item>

            <bullet-item 
                title="The Technical User (Engineer):" 
                content="Needs the ability to inspect detailed execution logs, evaluate the exact JSON payloads dispatched to external systems, and monitor API latency. They require granular visibility into the AI's reasoning pathway and confidence scores to debug edge cases and hallucinations.">
            </bullet-item>

            <bullet-item 
                title="The System Administrator:" 
                content="Demands global access controls. The Administrator needs tools to register new system protocols, map encrypted API credentials safely, update vector database embedding targets, and modify the core underlying LLM provider without requiring service downtime or engineering deployments.">
            </bullet-item>
        </div>
