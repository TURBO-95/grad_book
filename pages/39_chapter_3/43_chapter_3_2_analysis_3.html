<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chapter 3.2 — Analysis of Existing Systems (Part 3)</title>
    <style>
        :root { --primary: #1a365d; --gold: #c6a254; --text-dark: #2d3748; --text-muted: #718096; --surface: #f8fafc; --border: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; color: var(--text-dark); font-size: 10.5pt; line-height: 1.6; }

        .page-body { width: 100%; height: 100vh; padding: 42px 52px; display: flex; flex-direction: column; overflow: hidden; page-break-after: always; }
        .content-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        .page-sub-header { margin-bottom: 24px; flex-shrink: 0; }
        .sub-header-title { font-size: 20pt; color: var(--primary); font-weight: 800; margin-bottom: 8px; }
        .sub-header-divider { height: 2px; width: 200px; background: var(--gold); border-radius: 2px; }

        .text-section { margin-top: 24px; margin-bottom: 16px; }
        .text-section-title { font-size: 13pt; color: var(--primary); font-weight: 700; margin-bottom: 10px; }
        .text-section-content { text-align: justify; text-indent: 30px; line-height: 1.6; }

        /* Competitor Table Container & Header Styles */
        .competitor-table-container { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: #ffffff; }
        .competitor-header {
            display: grid;
            grid-template-columns: 22% 23% 25% 30%;
            background: var(--surface);
            border-bottom: 2px solid var(--border);
            font-size: 9.5pt;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .competitor-header > div { padding: 14px 18px; }

        /* Competitor Row Component CSS */
        .competitor-row { display: grid; grid-template-columns: 22% 23% 25% 30%; border-bottom: 1px solid var(--border); font-size: 9.5pt; align-items: stretch; }
        .competitor-row:last-child { border-bottom: none; }
        .comp-col-meta { padding: 16px 18px; display: flex; flex-direction: column; justify-content: center; }
        .comp-category { font-weight: 700; color: var(--primary); margin-bottom: 6px; font-size: 10.5pt; }
        .comp-players { font-size: 9pt; color: var(--text-muted); font-style: italic; }
        .comp-col-text { padding: 16px 18px; display: flex; align-items: center; line-height: 1.5; }
        .comp-diff { background: var(--surface); font-weight: 600; color: var(--primary); border-left: 1px solid var(--border); }

        .page-footer { margin-top: auto; text-align: center; padding-top: 18px; flex-shrink: 0; }
        .page-number { font-size: 11pt; font-weight: bold; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="page-body pdf-flex-page">
        <!-- Maintain visual continuity from previous page -->
        <div class="content-wrapper">
            <div class="competitor-table-container">
                <!-- Table Header for continuity -->
                <div class="competitor-header">
                    <div>Category</div>
                    <div>Strengths</div>
                    <div>Weaknesses</div>
                    <div>IntgraServeAI's Differentiator</div>
                </div>

                <!-- Developer Frameworks -->
                <competitor-row 
                    category="Developer Frameworks" 
                    players="(e.g., LangChain, LlamaIndex)" 
                    strengths="Offers maximum programmatic flexibility and granular execution control via open-source libraries for building custom agents." 
                    weaknesses="Extremely high development overhead. They are toolkits requiring significant in-house expertise, not deployable end-to-end solutions." 
                    differentiator="Enterprise-Ready Service: A fully architected, containerized, deployable backend platform rather than just a disjointed collection of tools.">
                </competitor-row>
            </div>

            <text-section 
                title="Strategic System Positioning" 
                content="The analysis clearly dictates that combining these fragmented capabilities is necessary. Developers require the flexibility found in frameworks like LangChain, while enterprises demand the out-of-the-box reliability and structured permissions found in platforms like Zendesk.">
            </text-section>
            
            <text-section 
                title="" 
                content="Therefore, IntgraServeAI is explicitly analyzed and designed as a middle-layer orchestration system. By abstracting the heavy lifting of API compilation and contextual session management away from the client application, it provides an 'Enterprise-Ready' infrastructure that directly bridges the gap between raw LLM intelligence and secure, backend system execution.">
            </text-section>
        </div>

        <page-footer page="34"></page-footer>
    </div>
</body>
</html>
