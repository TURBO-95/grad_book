    <div class="page-body pdf-flex-page">
        <page-sub-header title=""></page-sub-header>

        <div class="content-wrapper">
            <bullet-item 
                title="PostgreSQL & SQLAlchemy 2.0:" 
                content="Relational data persistence is managed by PostgreSQL. SQLAlchemy 2.0 Async is utilized as the Object-Relational Mapper (ORM), enforcing strict schema types and allowing non-blocking database queries, a necessity for maintaining stable WebSocket chat connections.">
            </bullet-item>

            <bullet-item 
                title="OpenAPI & gRPC Reflection:" 
                content="To discover and execute external actions, the system parses OpenAPI (Swagger) specifications for RESTful endpoints. For highly optimized microservices, it leverages grpcio and grpc-tools to dynamically compile Protobuf (.proto) definitions and dispatch binary RPCs using server reflection at runtime.">
            </bullet-item>

            <bullet-item 
                title="Docker & GitHub Actions:" 
                content="For deployment and continuous integration, the service is containerized using Docker, allowing it to be spun up identically across development and production environments. GitHub Actions orchestrates the testing pipelines, executing the Pytest suites on every code commit to guarantee system integrity.">
            </bullet-item>

            <bullet-item 
                title="React & TypeScript:" 
                content="While the primary focus of this project is the backend orchestrator, the complementary frontend UI (for agent dashboards and administrative configuration) is developed using React and statically typed via TypeScript to safely consume the auto-generated backend schemas.">
            </bullet-item>
        </div>

        <page-footer page="53"></page-footer>
