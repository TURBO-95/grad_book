<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 1: Cover</title>
    <style>
        :root {
            --primary: #1a365d;
            --gold: #c6a254;
            --text-dark: #2d3748;
            --text-body: #333333;
            --surface: #f8fafc;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Times New Roman", Times, serif;
            color: var(--text-body);
            background: #ffffff;
        }
        .pdf-page {
            width: 100%;
            height: 100vh;
            padding: 36px 52px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            justify-content: center;
            border: 4px solid var(--primary);
            align-items: center;
            page-break-after: always;
        }
        .chapter-cover-container {
            text-align: center;
        }
        .chapter-number {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 20pt;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 12px;
            display: block;
        }
        .chapter-title {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 40pt;
            color: var(--primary);
            margin: 0;
            font-weight: bold;
        }
        .divider {
            height: 4px;
            width: 100px;
            background-color: var(--gold);
            margin: 40px auto;
        }
    </style>
</head>
<body>
    <div class="pdf-page">
        <chapter-cover number="3" title="System Analysis"></chapter-cover>
    </div>
</body>
</html>
