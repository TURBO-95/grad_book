    <div class="page-body pdf-flex-page">
        <page-sub-header title="3.3.2 Non-Functional Requirements"></page-sub-header>

        <div class="content-wrapper">
            <p class="text-paragraph">
                While functional requirements define what the system must do, non-functional requirements (NFRs) dictate how well it must execute those functions. For an autonomous agent operating within an enterprise ecosystem, stringent security and resiliency parameters are non-negotiable.
            </p>

            <text-section 
                title="Server-Side Request Forgery (SSRF) Mitigation" 
                content="Because the AI Action Engine is capable of constructing and executing outbound HTTP requests dynamically, it introduces a severe risk of SSRF attacks. The system must rigorously resolve and validate target URLs before execution. Access to internal loopback addresses (e.g., localhost, 127.0.0.1) and private IP ranges must be explicitly forbidden and intercepted by the engine's validation layer.">
            </text-section>

            <text-section 
                title="Injection and Path Traversal Prevention" 
                content="When generating API endpoints or database queries based on LLM output, the system must sanitize all parameters. Path variables must be stripped of dangerous characters (e.g., '../') to prevent path traversal. Similarly, when performing vector searches, dynamically generated collection names must pass strict regular expression validations to prevent SQL or identifier injection attacks against the underlying vector database.">
            </text-section>

            <text-section 
                title="Process-Level Data Reliability" 
                content="The system relies on file-based configurations (e.g., agent schemas, runtime parameters) to maximize speed and bypass database overhead. To prevent data corruption during simultaneous read/write cycles across multiple worker threads, the service layer must enforce process-level mutual exclusion using safe File Locks, ensuring configuration integrity.">
            </text-section>
        </div>
