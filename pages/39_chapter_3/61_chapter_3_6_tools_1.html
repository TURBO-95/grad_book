        <page-sub-header title="3.6 Tools and Languages"></page-sub-header>

        <div class="content-wrapper">
            <p class="text-paragraph">
                The technology stack for IntgraServeAI was rigorously selected based on a philosophy centered around high performance, scalability, and reliance on mature, industry-standard open-source ecosystems. The stack heavily prioritizes asynchronous I/O and dynamic reflection capabilities.
            </p>

            <bullet-item 
                title="Python 3.11 & FastAPI:" 
                content="Python serves as the core programming language, chosen for its unparalleled dominance in the AI and Machine Learning space. FastAPI was selected as the web framework due to its native asynchronous support, auto-generated OpenAPI documentation, and massive performance improvements over legacy frameworks like Django or Flask.">
            </bullet-item>

            <bullet-item 
                title="LangChain & LlamaIndex:" 
                content="These orchestrators manage the generative workflows. LangChain handles the agentic reasoning loops, memory serialization, and tool bindings, while LlamaIndex provides highly optimized abstractions for chunking, embedding, and retrieving organizational data for RAG integration.">
            </bullet-item>

            <bullet-item 
                title="Vector Search Extensions (pgvector / sqlite-vec):" 
                content="Rather than relying on isolated external vector databases like Pinecone, the system integrates vector embeddings directly alongside relational data. It utilizes the pgvector extension for production PostgreSQL deployments and dynamically compiles the sqlite-vec C-extensions for localized, lightweight environments.">
            </bullet-item>
