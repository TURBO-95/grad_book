<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chapter 1.6 — Project Timeline</title>
    <style>
        /* ── Design Tokens ────────────────────────────────────── */
        :root {
            --primary: #1a365d;
            --gold: #c6a254;
            --text-dark: #2d3748;
            --text-muted: #718096;
            --surface: #f8fafc;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            color: var(--text-dark);
            background: #ffffff;
            font-size: 10.5pt;
            line-height: 1.6;
        }

        /* ── PDF Page Container ───────────────────────────────── */
        .page-body {
            width: 100%;
            height: 100vh;
            padding: 42px 52px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            page-break-after: always;
        }

        /* ── Page Layout & Flow ───────────────────────────────── */
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .text-paragraph {
            text-align: justify;
            color: var(--text-dark);
            margin-bottom: 24px;
            text-indent: 30px;
        }

        /* ── Sub Header Component ─────────────────────────────── */
        .page-sub-header {
            margin-bottom: 24px;
            flex-shrink: 0;
        }

        .sub-header-title {
            font-size: 20pt;
            color: var(--primary);
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .sub-header-divider {
            height: 2px;
            width: 200px;
            background: var(--gold);
            border-radius: 2px;
        }

        /* ── Grid Timeline Table ──────────────────────────────── */
        .timeline-container {
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            background: #ffffff;
        }

        /* Header Row */
        .timeline-header {
            display: grid;
            grid-template-columns: 20% 28% 1fr;
            background: var(--surface);
            border-bottom: 2px solid var(--border);
            font-size: 10pt;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .timeline-header>div {
            padding: 14px 18px;
        }

        /* Timeline Row Component Styles */
        .timeline-row {
            display: grid;
            grid-template-columns: 20% 28% 1fr;
            border-bottom: 1px solid var(--border);
            align-items: center;
            /* Vertically centers the text */
        }

        /* Removes border from the absolute last row inside the container */
        .timeline-row:last-child .timeline-row {
            border-bottom: none;
        }

        .timeline-period {
            padding: 16px 18px;
            font-weight: 700;
            color: var(--primary);
            font-size: 10pt;
        }

        .timeline-phase {
            padding: 16px 18px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .timeline-tasks {
            padding: 16px 18px;
            color: var(--text-dark);
            line-height: 1.5;
            text-align: justify;
        }

        /* ── Page Footer Component ────────────────────────────── */
        .page-footer {
            margin-top: auto;
            text-align: center;
            padding-top: 18px;
            flex-shrink: 0;
        }

        .page-number {
            font-size: 11pt;
            font-weight: bold;
            color: var(--text-muted);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
    </style>
</head>

<body>

    <div class="page-body pdf-flex-page">

        <!-- Header -->
        <page-sub-header title="1.6 Project Timeline"></page-sub-header>

        <!-- Main Content Area -->
        <div class="content-wrapper">

            <p class="text-paragraph">
                The execution of the IntgraServeAI project is structurally divided into six distinct, consecutive phases
                spanning an academic year, ensuring a systematic transition from foundational research to final
                delivery.
            </p>

            <!-- CSS Grid Timeline Table -->
            <div class="timeline-container">

                <!-- Table Header -->
                <div class="timeline-header">
                    <div>Period</div>
                    <div>Phase</div>
                    <div>Key Tasks</div>
                </div>

                <!-- Table Rows using Component -->
                <timeline-row period="Oct–Nov 2025" phase="Foundation &amp; Planning"
                    tasks="Idea discussion, scope finalization, technology stack selection, literature review, system architecture design, and development environment setup.">
                </timeline-row>

                <timeline-row period="Dec–Jan 2026" phase="Core Service Development"
                    tasks="Build basic service framework, integrate core LLM API, develop conversation management logic, establish unit testing, and logging setup.">
                </timeline-row>

                <timeline-row period="Feb–Mar 2026" phase="RAG Implementation"
                    tasks="Vector database setup, document processing, embedding pipeline creation, implement retrieval logic, and LLM integration testing.">
                </timeline-row>

                <timeline-row period="Apr–May 2026" phase="Dynamic Action Implementation"
                    tasks="Develop mock server, implement client discovery, translate APIs to LLM tool schemas, and execute full system integration testing.">
                </timeline-row>

                <timeline-row period="Jun–Jul 2026" phase="Testing &amp; Refinement"
                    tasks="End-to-end system testing, latency/performance tuning, develop the demonstration UI dashboard, and finalize user acceptance testing.">
                </timeline-row>

                <timeline-row period="Aug–Sep 2026" phase="Finalization &amp; Delivery"
                    tasks="Finalize all architectural documentation, write the final graduation thesis report, and prepare for the final project defense presentation.">
                </timeline-row>

            </div>

        </div>

        <!-- Footer -->
        <page-footer page="6"></page-footer>

    </div>

</body>

</html>
