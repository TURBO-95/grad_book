        <div class="content-wrapper">
            <p class="text-paragraph">
                Beyond authentication, the system architecture mandates two fundamentally different networking interface protocols to handle the disparate nature of backend administration versus live generative AI interaction.
            </p>

            <text-section 
                title="The RESTful Administration Interface" 
                content="For operations that are strictly deterministic and transactional—such as assigning tickets, updating system configurations, or parsing execution logs—the interface implements standard REST (Representational State Transfer) architecture. These interfaces utilize standard HTTP verbs (GET, POST, PUT, DELETE) and return structured JSON payloads. This design ensures that the system is easily consumable by any standard HTTP client or third-party web dashboard.">
            </text-section>

            <text-section 
                title="The Bi-Directional WebSocket Gateway" 
                content="Conversely, traditional REST HTTP requests are inadequate for generative AI due to connection timeouts and blocking behavior. To resolve this, the system exposes a persistent `/ws` WebSocket interface for end-user interaction. This interface operates asynchronously, utilizing an event-driven generator that continuously streams execution status events (e.g., `tool_start`, `pause`, `token`, `done`) back to the client interface in real-time, completely bypassing the limitations of a standard HTTP request-response cycle.">
            </text-section>
        </div>

        <page-footer page="69"></page-footer>
