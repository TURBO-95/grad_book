<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Table of Contents</title>
    <style>
        /* ── Design Tokens ────────────────────────────────────── */
        :root {
            --primary:   #1a365d;
            --gold:      #c6a254;
            --text-dark: #2d3748;
            --text-body: #333333;
            --text-muted:#718096;
            --surface:   #f8fafc;
            --border:    #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Times New Roman", Times, serif;
            color: var(--text-body);
            background: #ffffff;
        }

        /* ── PDF Page Container ───────────────────────────────── */
        .page-body {
            width: 100%;
            height: 100vh;
            padding: 36px 52px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Page Header (from component) ────────────────────── */
        .page-header {
            text-align: center;
            margin-bottom: 28px;
            flex-shrink: 0;
        }

        .page-header-title {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 26pt;
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .page-header-divider {
            height: 3px;
            width: 70px;
            background: var(--gold);
            margin: 0 auto;
        }

        /* ── TOC Content ──────────────────────────────────────── */
        .toc-content {
            flex: 1;
            overflow: hidden;
        }

        /* Front Matter section label */
        .toc-section-label {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 8pt;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 8px;
            margin-top: 18px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }

        .toc-section-label:first-child { margin-top: 0; }

        /* Front Matter entries */
        .toc-front-matter {
            display: flex;
            align-items: baseline;
            padding: 4px 0;
            font-size: 11pt;
            color: var(--text-body);
        }

        .toc-front-title { flex-shrink: 0; }

        /* Chapter entries */
        .toc-chapter {
            display: flex;
            align-items: baseline;
            padding: 6px 0;
            font-size: 11.5pt;
            font-weight: bold;
            color: var(--primary);
        }

        .toc-chapter-num {
            min-width: 90px;
            flex-shrink: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        .toc-chapter-title { flex-shrink: 0; }

        /* Section entries */
        .toc-section {
            display: flex;
            align-items: baseline;
            padding: 3px 0 3px 22px;
            font-size: 10.5pt;
            color: var(--text-body);
        }

        .toc-section-num {
            min-width: 50px;
            flex-shrink: 0;
            color: var(--text-muted);
        }

        .toc-section-title { flex-shrink: 0; }

        /* Shared dot leaders */
        .toc-dots {
            flex: 1;
            border-bottom: 1.5px dotted #cbd5e0;
            margin: 0 8px 3px 8px;
            min-width: 20px;
        }

        .toc-chapter-page,
        .toc-section-page,
        .toc-front-page {
            flex-shrink: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 10pt;
            color: var(--text-muted);
        }

        .toc-chapter-page { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="page-body pdf-flex-page">

        <page-header title="Table of Contents"></page-header>

        <div class="toc-content">

            <!-- ── Front Matter ─────────────────────────────── -->
            <div class="toc-section-label">Front Matter</div>

            <toc-front-matter title="Abstract"               page="i"></toc-front-matter>
            <toc-front-matter title="Acknowledgement"        page="ii"></toc-front-matter>
            <toc-front-matter title="Table of Contents"      page="iii"></toc-front-matter>
            <toc-front-matter title="List of Figures"        page="iv"></toc-front-matter>
            <toc-front-matter title="List of Tables"         page="v"></toc-front-matter>
            <toc-front-matter title="List of Abbreviations"  page="vi"></toc-front-matter>

            <!-- ── Chapters ─────────────────────────────────── -->
            <div class="toc-section-label">Chapters</div>

            <toc-chapter num="Chapter 1" title="Introduction"                              page="1"></toc-chapter>
            <toc-section num="1.1"       title="Background and Motivation"                 page="2"></toc-section>
            <toc-section num="1.2"       title="Problem Statement"                         page="4"></toc-section>
            <toc-section num="1.3"       title="Project Objectives"                        page="6"></toc-section>
            <toc-section num="1.4"       title="Scope and Limitations"                     page="7"></toc-section>
            <toc-section num="1.5"       title="Report Organisation"                       page="8"></toc-section>

            <toc-chapter num="Chapter 2" title="Literature Review"                         page="9"></toc-chapter>
            <toc-section num="2.1"       title="Evolution of Conversational AI"            page="10"></toc-section>
            <toc-section num="2.2"       title="Retrieval-Augmented Generation (RAG)"      page="12"></toc-section>
            <toc-section num="2.3"       title="LLM Tool Use and Function Calling"         page="15"></toc-section>
            <toc-section num="2.4"       title="API Integration Frameworks"                page="17"></toc-section>

            <toc-chapter num="Chapter 3" title="System Analysis and Design"                page="19"></toc-chapter>
            <toc-section num="3.1"       title="Requirements Analysis"                     page="20"></toc-section>
            <toc-section num="3.2"       title="System Architecture"                       page="23"></toc-section>
            <toc-section num="3.3"       title="Use Case Specifications"                   page="27"></toc-section>
            <toc-section num="3.4"       title="Data Flow and Sequence Diagrams"            page="30"></toc-section>

            <toc-chapter num="Chapter 4" title="Implementation"                            page="33"></toc-chapter>
            <toc-section num="4.1"       title="Technology Stack"                          page="34"></toc-section>
            <toc-section num="4.2"       title="Knowledge Pipeline (RAG)"                  page="36"></toc-section>
            <toc-section num="4.3"       title="Action Engine"                             page="40"></toc-section>
            <toc-section num="4.4"       title="Conversational Orchestration Layer"        page="44"></toc-section>

            <toc-chapter num="Chapter 5" title="Testing and Evaluation"                    page="48"></toc-chapter>
            <toc-section num="5.1"       title="Testing Strategy"                          page="49"></toc-section>
            <toc-section num="5.2"       title="Unit and Integration Tests"                page="51"></toc-section>
            <toc-section num="5.3"       title="Performance Evaluation"                    page="54"></toc-section>

            <toc-chapter num="Chapter 6" title="Conclusion and Future Work"                page="57"></toc-chapter>
            <toc-section num="6.1"       title="Summary of Contributions"                 page="58"></toc-section>
            <toc-section num="6.2"       title="Future Work"                               page="59"></toc-section>

            <div class="toc-section-label">Back Matter</div>
            <toc-front-matter title="References"    page="61"></toc-front-matter>
            <toc-front-matter title="Appendix A — Use Case Specifications"  page="65"></toc-front-matter>
            <toc-front-matter title="Appendix B — Sequence Diagrams"        page="70"></toc-front-matter>
            <toc-front-matter title="Appendix C — API Reference"            page="74"></toc-front-matter>

        </div>

    </div>

</body>
</html>
